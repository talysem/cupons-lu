<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cupons da Lu</title>

    <link rel="stylesheet" href="styles.css">

    <script defer type="text/javascript"
        src="https://cdnjs.cloudflare.com/ajax/libs/knockout/3.5.1/knockout-latest.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script defer src="index.js"></script>
</head>

<body>

    <div id="siteLu">

        <div id="mainInfos" data-bind="with: infos">
            <div id="mainImage" data-bind="style: { background: foto }">
                <img data-bind="attr: { src: foto }">
            </div>
            <h1 data-bind="text: titulo"></h1>
            <p id="bioText" data-bind="text: bio"></p>

            <div id="social_logos">
                <a class="social_logo" data-bind="attr: { href: 'https://instagram.com/' + instagram }">
                    <svg width="auto" height="auto" viewBox="0 0 228 228" fill="none"
                        xmlns="http://www.w3.org/2000/svg">

                            fill="black" />
                    </svg>
                </a>

                <a class="social_logo" data-bind="attr: { href: 'https://tiktok.com/@' + tiktok }">
                    <svg width="auto" height="auto" viewBox="0 0 203 234" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path fill-rule="evenodd" clip-rule="evenodd"
                            d="M105.804 86.25L105.532 172.5L102.752 178.161C96.448 190.997 82.182 198.201 67.687 195.867C49.33 192.911 37.616 176.772 40.187 157.978C41.684 147.032 47.869 138.794 59.032 132.883C62.928 130.82 64.908 130.5 73.782 130.5H84.032V109.857C84.032 91.956 83.822 89.133 82.45 88.607C81.58 88.273 77.2861 88 72.9081 88C41.781 88 14.34 107.367 3.48104 137C-0.207957 147.067 -1.13795 166.273 1.52805 177.312C6.67805 198.635 20.547 216.248 39.532 225.576C51.716 231.562 59.135 233.307 72.532 233.336C86.093 233.366 93.297 231.633 105.986 225.288C122.564 216.998 135.421 201.914 141.602 183.5C145.015 173.333 145.89 159.163 145.972 112.75C146.005 94.188 146.202 79 146.411 79C146.619 79 149.372 80.555 152.528 82.456C164.387 89.597 180.675 94.894 195.782 96.523L202.032 97.196V77.727V58.258L196.929 57.581C189.081 56.54 176.739 51.623 168.913 46.421C155.64 37.597 146.602 22.411 144.47 5.353L143.802 0H124.938H106.075L105.804 86.25Z"
                            fill="black" />
                    </svg>
                </a>
            </div>

        </div>

        <div id="cards" data-bind="foreach: cupons">

            <div class="card">
                <img data-bind="attr: { src: imagem }">

                <div class="card_data">
                    <span class="brand" data-bind="text: marca"></span>

                    <span class="discount" data-bind="text: desconto"></span>
                    <span class="freight" data-bind="visible: freteGratis">+ Frete grátis</span>

                    <div class="card_data_copy">
                        <div class="cupom" data-bind="text: cupom, click: $parent.copiarCupom"></div>
                        <div class="button" data-bind="click: $parent.copiarCupom">Copiar</div>
                    </div>

                    <a class="button main_button" data-bind="attr: { href: site }">
                        Visitar site
                    </a>
                </div>
            </div>

        </div>

    </div>

    <div class="toast" data-bind="css: { show: toastVisible }">
        <span data-bind="text: toastMessage"></span>
    </div>

</body>

</html>
