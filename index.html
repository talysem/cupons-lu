<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cupons da Luu</title>

    <base target="_blank">

    <link rel="icon" type="image/png" href="favicon.png">

    <link rel="stylesheet" href="styles.css">

    <script defer type="text/javascript"
        src="https://cdnjs.cloudflare.com/ajax/libs/knockout/3.5.1/knockout-latest.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script defer src="index.js"></script>
</head>

<body>

    <div id="loading" data-bind="visible: carregando">
        <div class="spinner"></div>
        <img id="img_loader" src="favicon.png" alt="Cupons da Luu">
    </div>

    <div id="siteLu">

        <div id="mainInfos" data-bind="with: infos">

            <div class="share" data-bind="click: $parent.compartilharPagina">
                <svg width="42" height="42" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="42" height="42" rx="21" fill="white" />
                    <path fill-rule="evenodd" clip-rule="evenodd"

                        fill="#8A2C4E" />
                </svg>
            </div>

            <div id="mainImage" data-bind="style: { background: foto }">
                <img data-bind="attr: { src: foto }">
            </div>

            <div id="title_bio">
                <h1 data-bind="text: titulo"></h1>
                <p id="bioText" data-bind="text: bio"></p>
            </div>

            <div id="social_logos">
                <p>Onde me encontrar:</p>

                <a class="social_logo" data-bind="attr: { href: 'https://instagram.com/' + instagram }">
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="48" height="48" rx="24" fill="#8A2C4E" />
                        <path fill-rule="evenodd" clip-rule="evenodd"

83C28.2685 27.6783 29.6349 23.4295 27.1018 20.9051C26.0266 19.8336 24.6319 19.4013 23.1734 19.6878Z"
                            fill="white" />
                    </svg>
                </a>

                <a class="social_logo" data-bind="attr: { href: 'https://tiktok.com/@' + tiktok }">
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="48" height="48" rx="24" fill="#8A2C4E" />
                        <path fill-rule="evenodd" clip-rule="evenodd"
                            d="M24.4929 20.8713L24.4649 29.7426L24.179 30.3249C23.5306 31.6451 22.0633 32.3861 20.5724 32.1461C18.6842 31.842 17.4794 30.182 17.7438 28.249C17.8978 27.1231 18.534 26.2758 19.6821 25.6678C20.0829 25.4556 20.2865 25.4227 21.1993 25.4227H22.2535V23.2994C22.2535 21.4582 22.2319 21.1678 22.0908 21.1137C22.0013 21.0794 21.5597 21.0513 21.1094 21.0513C17.9078 21.0513 15.0853 23.0433 13.9684 26.0912C13.589 27.1267 13.4933 29.1021 13.7675 30.2376C14.2972 32.4308 15.7237 34.2424 17.6765 35.2018C18.9296 35.8175 19.6927 35.997 21.0707 36C22.4655 36.003 23.2065 35.8248 24.5116 35.1722C26.2168 34.3195 27.5392 32.768 28.1749 30.874C28.526 29.8283 28.616 28.3708 28.6244 23.597C28.6278 21.6878 28.6481 20.1256 28.6696 20.1256C28.691 20.1256 28.9741 20.2855 29.2987 20.4811C30.5185 21.2156 32.1938 21.7604 33.7477 21.928L34.3905 21.9972V19.9947V17.9922L33.8656 17.9225C33.0584 17.8155 31.789 17.3097 30.984 16.7747C29.6188 15.8671 28.6892 14.3051 28.4699 12.5506L28.4012 12H26.461H24.5208L24.4929 20.8713Z"
                            fill="white" />
                    </svg>
                </a>
            </div>

        </div>

        <div id="cupons">

            <div id="filtros">
                <select data-bind="value: filtroMarca, options: marcasDisponiveis, optionsCaption: 'Todas as marcas'">
                </select>

                <label>
                    Apenas com frete grátis
                    <div id="switch">
                        <div></div>
                        <input type="checkbox" data-bind="checked: filtroFrete">
                    </div>
                </label>
            </div>

            <div id="cards" data-bind="foreach: cuponsFiltrados">

                <div class="card">
                    <div class="share" data-bind="click: $parent.compartilhar">
                        <svg width="42" height="42" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect width="42" height="42" rx="21" fill="white" />
                            <path fill-rule="evenodd" clip-rule="evenodd"
                                d="M18.4829 11.0426C16.3975 13.1345 16.1414 13.6004 16.7447 14.2039C17.2716 14.7306 17.9221 14.5566 18.9212 13.6222L19.8617 12.7425L19.8645 18.7922C19.8675 25.5915 19.8998 25.7905 21 25.7905C22.1002 25.7905 22.1325 25.5915 22.1355 18.7922L22.1383 12.7425L23.0788 13.6222C24.0779 14.5566 24.7284 14.7306 25.2553 14.2039C25.8649 13.5942 25.6072 13.1263 23.5108 11.0363C22.005 9.53502 21.3434 9 20.9937 9C20.6429 9 19.9878 9.53293 18.4829 11.0426ZM12.397 17.1257C12.1162 17.436 12.083 18.2532 12.083 24.8749C12.083 32.1593 12.0895 32.2828 12.4824 32.6386C12.862 32.9822 13.283 33 21 33C28.717 33 29.138 32.9822 29.5176 32.6386C29.9107 32.2828 29.917 32.1599 29.917 24.8419C29.917 17.8796 29.895 17.3867 29.57 17.0926C29.293 16.8418 28.8164 16.7787 27.2028 16.7787C25.2337 16.7787 25.1745 16.7912 24.8576 17.2748C24.5662 17.7195 24.5615 17.8229 24.8123 18.2708C25.0688 18.729 25.2065 18.7755 26.461 18.8265L27.83 18.8823V24.8502V30.8182H21H14.17V24.8502V18.8823L15.539 18.8265C16.7935 18.7755 16.9312 18.729 17.1877 18.2708C17.4385 17.8229 17.4338 17.7195 17.1424 17.2748C16.825 16.7904 16.769 16.7787 14.7642 16.7787C13.0161 16.7787 12.6643 16.8303 12.397 17.1257Z"
                                fill="#8A2C4E" />
                        </svg>
                    </div>

                    <img data-bind="attr: { src: imagem }">

                    <div class="card_data">
                        <span class="brand" data-bind="text: marca"></span>

                        <div class="ofertas">
                            <span class="discount" data-bind="text: desconto"></span>
                            <span class="freight" data-bind="visible: freteGratis">+ Frete grátis</span>
                        </div>

                        <div class="botoes">
                            <div class="cupom" data-bind="click: $parent.copiarCupom">
                                <p data-bind="text: cupom"></p>
                                <svg width="21" height="24" viewBox="0 0 21 24" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path fill-rule="evenodd" clip-rule="evenodd"
                                        d="M5.3265 0.46875C5.04206 0.903 5.04206 0.972 5.3265 1.40625L5.63363 1.875H11.3451H17.0565L17.6689 2.42194L18.2812 2.96887L18.3343 10.6133C18.3701 15.7779 18.4536 18.3375 18.5916 18.5038C18.9137 18.8917 19.8307 18.8079 20.0655 18.3692C20.2056 18.1078 20.2517 15.5948 20.2129 10.3536C20.151 1.99819 20.1782 2.20612 19.0011 1.08806C17.9042 0.046125 17.5802 0 11.3541 0H5.63363L5.3265 0.46875ZM3.28125 3.84206C3.17812 3.87656 2.86331 3.9555 2.5815 4.01756C1.85906 4.17675 0.752625 5.20519 0.349687 6.09206C0.039 6.77588 0.00787506 7.48031 0.00412506 13.9005L0 20.9573L0.522 21.9564C0.944625 22.7655 1.2345 23.0554 2.04356 23.478L3.04275 24H8.18362C13.7779 24 14.169 23.9398 15.2511 22.9119C16.4152 21.8062 16.4004 21.9073 16.4683 14.5312C16.5409 6.62831 16.4837 6.16125 15.2989 4.97644C14.1679 3.84544 13.5866 3.74738 8.12006 3.76481C5.56181 3.77288 3.38438 3.80775 3.28125 3.84206ZM2.52112 6.25388L1.875 6.9V13.7719C1.875 21.2257 1.90275 21.4463 2.901 21.9009C3.24263 22.0566 4.90575 22.125 8.34956 22.125H13.3065L13.9189 21.5779L14.5312 21.0308V13.8947V6.75844L14.0117 6.23869L13.4921 5.71875L8.3295 5.66325L3.16706 5.60794L2.52112 6.25388Z"
                                        fill="#8A2C4E" />
                                </svg>
                            </div>

                            <a class="button main_button" data-bind="attr: { href: site }">
                                Visitar site
                            </a>
                        </div>
                    </div>

                    <p class="condicao" data-bind="text: '*' + regra"></p>
                </div>

            </div>

            <!-- final dos card -->

        </div>

        <!--sem resultados nos filtros-->

        <div class="sem-resultados" data-bind="visible: semResultados">
            <p>
                Poxa, parece que não há resultados para essa combinação de filtros...
            </p>

            <p>Tente uma nova combinação ;)</p>

            <img src="cat.jpg" alt="Gatinho triste">
        </div>

        <!--sem resultados nos filtros-->

        <!--mensagem final-->

        <div id="final" data-bind="with: infos">
            <p data-bind="visible: mostrarInfosCargoEmpresa">
                <span data-bind="text: titulo"></span> é matindo com carinho por
                <span id="final_name" data-bind="text: nome"></span>, <span data-bind="text: cargo"></span> na <a
                    data-bind="attr: {href: 'https://instagram.com/' + empresa}">@<span
                        data-bind="text: empresa"></span></a>
            </p>
            <p data-bind="visible: !mostrarInfosCargoEmpresa">Feito com carinho ❤︎</p>
            <p>Desenvolvido por <a href="https://instagram.com/talys.png">@talys.png</a></p>
        </div>

        <!--mensagem final-->

    </div>

    <!--notificação de retorno dos cupons-->

    <div class="toast" data-bind="css: { show: toastVisible }">
        <span data-bind="text: toastMessage"></span>
    </div>

    <!--notificação de retorno dos cupons-->

    <button id="voltarTopo" aria-label="Voltar ao topo">↑</button>

</body>

</html>
